name: Release

# Triggers:
# - Tag push (v*.*.*) → real release: builds + publishes artifacts to a
#   draft GitHub Release.
# - Manual workflow_dispatch → smoke build: builds artifacts on each OS
#   and uploads them as workflow artifacts (downloadable from the run page).
#   No GitHub Release is created. Use this to test installers before tagging.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      platforms:
        description: "Which OSes to build (comma list of: linux,windows,macos)"
        type: string
        default: "linux,windows,macos"

# electron-builder needs to upload artifacts to the GitHub Release, which
# requires write access to the repo's contents. The default GITHUB_TOKEN
# is read-only without this block.
permissions:
  contents: write

jobs:
  # Run typecheck + lint + tests once on Linux. Cross-platform packaging
  # bugs aren't caught by tests; running them on every OS triples CI cost
  # for no signal.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  # Emits the OS matrix as JSON. Tag pushes always build all three;
  # workflow_dispatch honors the `platforms` input. We do this in a job
  # rather than the matrix definition because GitHub Actions doesn't allow
  # `matrix` to be referenced in job-level `if:` conditions.
  setup:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo 'matrix=["ubuntu-latest","windows-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          input='${{ github.event.inputs.platforms }}'
          oses=()
          [[ "$input" == *"linux"*   ]] && oses+=('"ubuntu-latest"')
          [[ "$input" == *"windows"* ]] && oses+=('"windows-latest"')
          [[ "$input" == *"macos"*   ]] && oses+=('"macos-latest"')
          if [[ ${#oses[@]} -eq 0 ]]; then
            echo "::error ::No OSes selected (input: '$input'). Use a comma list of: linux,windows,macos"
            exit 1
          fi
          IFS=, ; echo "matrix=[${oses[*]}]" >> "$GITHUB_OUTPUT"

      # Pre-create the draft release so the parallel build matrix doesn't
      # race to create it. electron-builder's "find or create draft" lookup
      # is not atomic — without this step, two runners that both see "no
      # draft" each create one, and artifacts split across duplicate drafts
      # (~50% reproduction on three-OS builds). With a draft already in
      # place, every matrix job's `--publish always` finds it and uploads
      # to the same release. Idempotent on workflow re-run.
      - name: Pre-create draft release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          state=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft -q .isDraft 2>/dev/null || echo "missing")
          case "$state" in
            true)
              echo "Draft $GITHUB_REF_NAME already exists; matrix jobs will upload to it."
              ;;
            false)
              echo "::error ::Release $GITHUB_REF_NAME is already published; refusing to upload to it. Delete or re-tag."
              exit 1
              ;;
            missing)
              gh release create "$GITHUB_REF_NAME" \
                --repo "$GITHUB_REPOSITORY" \
                --draft \
                --title "$GITHUB_REF_NAME" \
                --notes ""
              ;;
          esac

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      # Cache Electron's prebuilt binary download and electron-builder's
      # tool/staging cache. Cuts 1–2 min/OS off the build job.
      # The cache action silently skips paths that don't exist on the
      # current OS, so we list every platform's directory in one step.
      # Key by lockfile hash so version bumps re-fetch; restore-keys
      # lets stale-but-similar caches still hit on bumps.
      - name: Cache Electron downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Compile Electron main process
        run: npm run build:electron

      # On tag push: publish to GitHub Releases. Otherwise: just build.
      - name: Package with electron-builder (tag push — publish to release)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always

      - name: Package with electron-builder (manual run — build only)
        if: github.event_name == 'workflow_dispatch'
        run: npx electron-builder --publish never

      # Visual smoke-verify that the fuses landed in the packaged binary.
      # Output goes to the job log; a human reviews on each release.
      # Authoritative value lock-in is in tests/electron/fuses.test.ts.
      - name: Verify Electron fuses
        shell: bash
        run: |
          # Per-platform target list:
          # - Linux: linux-unpacked/scriptr is the staging tree electron-builder
          #   applies fuses to before packaging. We ALSO extract the shipped
          #   AppImage (--appimage-extract; no FUSE required) and verify its
          #   binary so we cover both staging and shipped artifact.
          # - Windows: win-unpacked/scriptr.exe is what NSIS bundles; bytes
          #   pass through the installer wrapper unchanged.
          # - macOS: arch:[x64,arm64] without a universal target produces
          #   release/mac/scriptr.app and release/mac-arm64/scriptr.app. We
          #   discover each and pass the .app bundle (NOT the inner Mach-O
          #   binary) to `@electron/fuses read --app`, which is the documented
          #   interface for macOS app bundles.
          targets=()
          case "${{ matrix.os }}" in
            ubuntu-latest)
              targets+=("release/linux-unpacked/scriptr")
              appimage=$(find release -maxdepth 2 -type f -name "*.AppImage" 2>/dev/null | head -1)
              if [[ -n "$appimage" ]]; then
                chmod +x "$appimage"
                # --appimage-extract dumps the squashfs to ./squashfs-root/
                # in the cwd. cd into release/ so we don't pollute the repo.
                (cd release && ./"$(basename "$appimage")" --appimage-extract >/dev/null)
                if [[ -e release/squashfs-root/scriptr ]]; then
                  targets+=("release/squashfs-root/scriptr")
                else
                  echo "::warning ::AppImage extracted but no scriptr binary at squashfs-root/scriptr"
                  ls -la release/squashfs-root/ || true
                fi
              else
                echo "::warning ::No .AppImage found under release/; only staging tree verified"
              fi
              ;;
            windows-latest)
              targets+=("release/win-unpacked/scriptr.exe")
              ;;
            macos-latest)
              # macOS runners ship bash 3.2 (Apple's last GPLv2 bash) which
              # lacks `mapfile`. Use a portable while-read loop so this step
              # works on every platform.
              apps=()
              while IFS= read -r line; do
                apps+=("$line")
              done < <(find release -maxdepth 3 -type d -name "scriptr.app" 2>/dev/null)
              if [[ ${#apps[@]} -eq 0 ]]; then
                echo "::error ::No scriptr.app found under release/"
                ls -la release/ || true
                exit 1
              fi
              for app in "${apps[@]}"; do
                targets+=("$app")
              done
              ;;
          esac
          for target in "${targets[@]}"; do
            if [[ ! -e "$target" ]]; then
              echo "::error ::Expected packaged target not found at $target"
              ls -la "$(dirname "$target")" || true
              exit 1
            fi
            echo "--- Fuses for $target ---"
            npx --yes @electron/fuses read --app "$target"
          done

      # Actually launch the packaged binary briefly and fail the job if
      # it emits a FATAL log line or exits early. This catches startup
      # crashes that the unit tests can't see — for example, a fuse set
      # to a value that points the browser process at a snapshot file
      # we don't ship (v0.3.0/v0.4.0/v0.4.1 all shipped this exact bug).
      # The fuses check above only verifies values were baked; only an
      # actual launch tells us the bytes work.
      #
      # Linux needs a virtual display because Electron creates a
      # BrowserWindow at startup. ubuntu-latest runners ship xvfb-run,
      # so we don't need to install it. Windows and macOS runners can
      # run GUI apps directly.
      #
      # matrix.os is GitHub-controlled (one of the strings in setup's
      # `matrix` output, which is itself populated from a hardcoded
      # allowlist), not user-controlled — safe to interpolate into a
      # `case` selector. No event payload data is interpolated here.
      - name: Smoke launch packaged binary
        shell: bash
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: |
          case "$MATRIX_OS" in
            ubuntu-latest)
              xvfb-run -a --server-args="-screen 0 1280x720x24" \
                node tests/electron/smoke-launch.mjs
              ;;
            *)
              node tests/electron/smoke-launch.mjs
              ;;
          esac

      # Upload installers as workflow artifacts so manual runs are useful.
      # On tag push these are duplicated by the GitHub Release upload; harmless.
      - name: Upload installers as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: scriptr-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap
          if-no-files-found: warn
          retention-days: 14
