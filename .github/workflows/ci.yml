name: CI

# Runs on every PR and every push to main. The Release workflow only
# fires on tag push or manual dispatch — by then a bad change has
# already merged. CI is the gate that blocks the merge.
on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs when a newer commit lands on the same ref.
# Saves minutes and gives faster feedback on the latest revision.
# github.ref is GitHub-controlled (refs/heads/<branch> or
# refs/pull/<n>/merge), not user input — safe to interpolate here.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linux job: lint + typecheck + electron compile + Next build + tests.
  # Comprehensive on the cheapest runner. This is the required check.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (Next/app tsconfig)
        run: npm run typecheck

      # Catches DOM/browser-type usage in lib/ that pollutes Electron's
      # no-DOM tsconfig. The Release workflow's per-OS build job runs
      # this too, but only on tag push or manual dispatch — by which
      # time the bad code has already merged. Run it here on every PR.
      - name: Compile Electron main process
        run: npm run build:electron

      - name: Next.js build
        run: npm run build

      # The privacy egress test loads tests/privacy/ fixtures including a
      # synthetic EPUB built by scripts/build-epub-fixtures.mts. `npm test`
      # builds these via its `pretest` hook, but the privacy step below runs
      # vitest directly and would miss the fixture if we relied on the hook
      # ordering. Build them explicitly here.
      - name: Build EPUB fixtures
        run: npm run build:fixtures

      # Privacy gate, surfaced as its own labeled check so reviewers see it in
      # the PR status list. Without this split, a regression in the egress
      # test would still fail "Tests" but the privacy intent gets lost in the
      # 700+ other tests. The file is also covered by `npm test` below — the
      # duplication is intentional and costs <1s.
      - name: Privacy — no external egress
        run: npx vitest run tests/privacy/

      - name: Tests
        run: npm test

      # Visibility-only: emit one ::warning:: annotation per high/critical
      # advisory. We deliberately do NOT fail the build — the goal is for
      # reviewers to see the dependency posture at a glance. `npm audit`
      # exits non-zero when findings exist; `continue-on-error` keeps the
      # job green and the inline parser turns the JSON into annotations.
      # No github.* expressions are interpolated into the run: block —
      # input comes only from `npm audit` against the checked-in lockfile.
      - name: Dependency audit (non-blocking)
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > audit.json
          set -e
          if [[ ! -s audit.json ]]; then
            echo "npm audit produced no output"
            exit 0
          fi
          NODE_NO_WARNINGS=1 node -e '
            const fs = require("node:fs");
            let report;
            try { report = JSON.parse(fs.readFileSync("audit.json", "utf-8")); }
            catch (e) { console.log("::warning ::npm audit output was not valid JSON: " + e.message); process.exit(0); }
            const vulns = (report && report.vulnerabilities) || {};
            let count = 0;
            for (const [name, info] of Object.entries(vulns)) {
              const sev = info && info.severity;
              if (sev !== "high" && sev !== "critical") continue;
              const via = Array.isArray(info.via) ? info.via : [];
              const advisory = via.find((v) => v && typeof v === "object" && v.url);
              const url = advisory ? advisory.url : "https://github.com/advisories";
              const title = (advisory && advisory.title) || sev;
              console.log(`::warning ::${name} (${sev}): ${title} — ${url}`);
              count += 1;
            }
            console.log(`npm audit summary: ${count} high/critical advisory annotation(s) emitted`);
          '
          rm -f audit.json

  # Cross-platform typecheck + Electron compile. Lint/build/test don't
  # vary by OS so they stay Linux-only above. This matrix exists to
  # surface case-sensitivity bugs (ext4 hides them; APFS/NTFS surface
  # them), path-separator regressions, and OS-specific tsc behavior
  # before Release runs the heavyweight per-OS packaging job.
  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (Next/app tsconfig)
        run: npm run typecheck
      - name: Compile Electron main process
        run: npm run build:electron
