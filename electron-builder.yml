appId: com.scriptr.app
productName: scriptr
copyright: Copyright © 2026 scriptr

# Files bundled into the asar inside the installer.
# We let electron-builder do its normal "copy production deps" pass — the
# main process needs `electron-updater` and its transitive deps at runtime.
# `dist/` (compiled main process) is the entry point; `package.json#main`
# points there.
files:
  - "dist/electron/**/*"
  - "dist/lib/**/*"
  - "package.json"
  - "!**/*.map"
  - "!**/__tests__/**"
  - "!**/*.test.*"

# Next.js standalone output — copied into resources/app, where main.ts
# expects it under process.resourcesPath/app.
extraResources:
  - from: ".next/standalone"
    to: "app"
  - from: ".next/static"
    to: "app/.next/static"
  - from: "public"
    to: "app/public"

directories:
  output: "release"

# Don't sign anything for v1 — design decision, flagged in README.
forceCodeSigning: false

# Compile-time security toggles baked into the packaged Electron binary.
# Each fuse rewrites a sentinel byte at package time; once flipped, the
# behavior cannot be re-enabled at runtime by argv or env.
# https://www.electronjs.org/docs/latest/tutorial/fuses
electronFuses:
  # MUST stay true. electron/server.ts spawns process.execPath with
  # ELECTRON_RUN_AS_NODE=1 to run Next's standalone server.js. Flipping
  # this off would break that spawn — packaged app would fail to boot.
  runAsNode: true

  # Refuse to load JavaScript from outside the asar archive. Tamper guard.
  onlyLoadAppFromAsar: true

  # Block --inspect / --remote-debugging-port from attaching a debugger to
  # the main process. Without this, an attacker with code-execution on the
  # user's machine could attach to a running scriptr.exe and exfiltrate the
  # in-memory xAI key.
  enableNodeCliInspectArguments: false

  # Same hardening for NODE_OPTIONS.
  enableNodeOptionsEnvironmentVariable: false

  # Encrypt cookies at rest using OS-level keys (Keychain / DPAPI /
  # libsecret). scriptr doesn't deliberately set cookies; defense in depth.
  enableCookieEncryption: true

  # Default true. Set explicitly so future electron-builder upgrades
  # don't silently flip it.
  loadBrowserProcessSpecificV8Snapshot: true

mac:
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity

win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: [x64]
  publisherName: scriptr

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  category: Office
  maintainer: scriptr

# Update feed — publish to GitHub Releases.
# owner/repo are auto-detected from package.json#repository.url so we don't
# duplicate the source-of-truth (also consumed by electron/repo.ts).
publish:
  provider: github
  releaseType: draft
