appId: com.scriptr.app
productName: scriptr
copyright: Copyright © 2026 scriptr

# Files bundled into the asar inside the installer.
# We let electron-builder do its normal "copy production deps" pass — the
# main process needs `electron-updater` and its transitive deps at runtime.
# `dist/` (compiled main process) is the entry point; `package.json#main`
# points there.
files:
  - "dist/electron/**/*"
  - "dist/lib/**/*"
  - "package.json"
  - "!**/*.map"
  - "!**/__tests__/**"
  - "!**/*.test.*"

# Next.js standalone output — copied into resources/app, where main.ts
# expects it under process.resourcesPath/app.
#
# IMPORTANT: electron-builder's extraResources auto-excludes any
# `node_modules/` subdirectory from the source — that's a hardcoded
# filter applied to filesystem subtrees, not a config knob. So
# `.next/standalone` copies everything EXCEPT its bundled
# `node_modules/`, and the resulting server.js crashes at startup with
# `Cannot find module 'next'`. Add a separate entry for the bundled
# node_modules so it copies through. Affected v0.10.0 (smoke-launch
# failed on linux+windows; macOS happened to work because of a prior
# install state). Fixed for v0.11.x.
extraResources:
  - from: ".next/standalone"
    to: "app"
  - from: ".next/standalone/node_modules"
    to: "app/node_modules"
  - from: ".next/static"
    to: "app/.next/static"
  - from: "public"
    to: "app/public"

directories:
  output: "release"

# Don't sign anything for v1 — design decision, flagged in README.
forceCodeSigning: false

# Bake compile-time security fuses into the packaged Electron binary.
# Each fuse rewrites a sentinel byte at package time; once flipped, the
# behavior cannot be re-enabled at runtime by argv or env.
# Authoritative fuse values + comments live in electron/afterPack.cjs.
# Lock-down test in tests/electron/fuses.test.ts.
# https://www.electronjs.org/docs/latest/tutorial/fuses
#
# NOTE: electron-builder 26+ has a declarative `electronFuses:` key that
# wraps @electron/fuses, but we ship 25.1.8 which rejects it as unknown.
# When/if we upgrade to 26+, this hook can be replaced with that block.
afterPack: ./electron/afterPack.cjs

mac:
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.productivity

win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: [x64]
  # No publisherName: installers are unsigned (forceCodeSigning: false), and
  # setting one makes electron-updater run Get-AuthenticodeSignature against
  # the downloaded installer post-download — which returns Status=NotSigned
  # and aborts auto-update with ERR_UPDATER_INVALID_SIGNATURE. Re-add only
  # if/when we sign.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  category: Office
  maintainer: scriptr

# Update feed — publish to GitHub Releases.
# owner/repo are auto-detected from package.json#repository.url so we don't
# duplicate the source-of-truth (also consumed by electron/repo.ts).
publish:
  provider: github
  releaseType: draft
